<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🎬 Kino</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS VARIABLES ──────────────────────────── */
    :root {
      --bg-base:      #0a0a0f;
      --bg-card:      #111118;
      --bg-surface:   #1a1a24;
      --bg-modal:     #12121a;
      --accent:       #e50914;
      --accent-dim:   rgba(229, 9, 20, 0.18);
      --accent-glow:  rgba(229, 9, 20, 0.45);
      --gold:         #f5a623;
      --text-primary: #f0f0f5;
      --text-muted:   #7a7a92;
      --text-dim:     #4a4a62;
      --border:       rgba(255,255,255,0.06);
      --radius-card:  12px;
      --radius-btn:   8px;
      --shadow-card:  0 8px 32px rgba(0,0,0,0.55);
      --shadow-glow:  0 0 24px var(--accent-glow);
    }

    /* ─── RESET ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg-base); }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    img { display: block; }
    button { cursor: pointer; font-family: inherit; border: none; outline: none; }

    /* ─── SCROLLBAR ──────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-surface); border-radius: 4px; }

    /* ─── HEADER ─────────────────────────────────── */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(10,10,15,0.98) 80%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 14px 16px 10px;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
      line-height: 1;
    }
    .logo span { color: var(--text-primary); }

    /* ─── SEARCH BAR ─────────────────────────────── */
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 280px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 12px 8px 34px;
      color: var(--text-primary);
      font-size: 13px;
      transition: border-color 0.2s;
    }
    #searchInput:focus {
      border-color: var(--accent);
      outline: none;
    }
    #searchInput::placeholder { color: var(--text-dim); }

    /* ─── SECTION TITLE ──────────────────────────── */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1.5px;
      color: var(--text-primary);
      padding: 16px 16px 10px;
    }
    .section-title span {
      color: var(--accent);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ─── GRID ───────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 12px 100px;
    }

    /* ─── KINO CARD ──────────────────────────────── */
    .kino-card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      animation: cardIn 0.4s ease both;
    }
    .kino-card:active {
      transform: scale(0.95);
    }
    @media (hover: hover) {
      .kino-card:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: var(--shadow-card), var(--shadow-glow);
        border-color: rgba(229,9,20,0.35);
      }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .kino-card:nth-child(1) { animation-delay: 0.03s; }
    .kino-card:nth-child(2) { animation-delay: 0.07s; }
    .kino-card:nth-child(3) { animation-delay: 0.11s; }
    .kino-card:nth-child(4) { animation-delay: 0.15s; }
    .kino-card:nth-child(5) { animation-delay: 0.19s; }
    .kino-card:nth-child(6) { animation-delay: 0.23s; }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: var(--bg-surface);
    }
    .card-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: linear-gradient(135deg, var(--bg-surface) 0%, #1e1e2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    .card-info {
      padding: 7px 8px 9px;
    }
    .card-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-parts {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .card-parts b { color: var(--gold); }

    /* ─── BADGE ──────────────────────────────────── */
    .card-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }
    .card-wrap { position: relative; }

    /* ─── LOADER ─────────────────────────────────── */
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--bg-surface);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { color: var(--text-muted); font-size: 13px; }

    /* ─── EMPTY STATE ────────────────────────────── */
    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 10px;
    }
    #emptyState .emoji { font-size: 48px; }
    #emptyState p { color: var(--text-muted); font-size: 14px; text-align: center; }

    /* ─── MODAL OVERLAY ──────────────────────────── */
    #modalOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #modalOverlay.active { display: block; }

    /* ─── MODAL SHEET ────────────────────────────── */
    #modal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 201;
      background: var(--bg-modal);
      border-radius: 20px 20px 0 0;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-top: 1px solid var(--border);
    }
    #modal.active { transform: translateY(0); }

    .modal-handle {
      width: 38px;
      height: 4px;
      background: var(--text-dim);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    /* ─── MODAL HERO ─────────────────────────────── */
    .modal-hero {
      position: relative;
      height: 210px;
      overflow: hidden;
    }
    .modal-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-hero-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg-surface), #1e1e30);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    .modal-hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg-modal) 0%, transparent 60%);
    }
    .modal-hero-title {
      position: absolute;
      bottom: 14px;
      left: 16px;
      right: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      line-height: 1.1;
    }

    /* ─── MODAL BODY ─────────────────────────────── */
    .modal-body { padding: 16px 16px 30px; }

    .modal-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .meta-tag {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
    }
    .meta-tag.accent { background: var(--accent-dim); border-color: rgba(229,9,20,0.3); color: var(--accent); }

    /* ─── PARTS LIST ─────────────────────────────── */
    .parts-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1px;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .parts-list { display: flex; flex-direction: column; gap: 8px; }

    .part-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 10px 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .part-item:active { background: #1e1e2e; }

    .part-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid rgba(229,9,20,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .part-info { flex: 1; min-width: 0; }
    .part-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .part-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── WATCH BUTTON ───────────────────────────── */
    .watch-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      border-radius: var(--radius-btn);
      padding: 9px 16px;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .watch-btn:active {
      transform: scale(0.93);
      background: #c0000f;
    }
    .watch-btn.loading { opacity: 0.7; pointer-events: none; }

    /* ─── TOAST ──────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 20px;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: #22c55e; }
    #toast.error   { border-color: var(--accent); }

    /* ─── CLOSE BTN ──────────────────────────────── */
    .modal-close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      z-index: 10;
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────── -->
<div id="header">
  <div class="header-row">
    <div class="logo">🎬 Kino<span>Bot</span></div>
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Kino qidiring..." autocomplete="off" />
    </div>
  </div>
</div>

<!-- ─── SECTION TITLE ──────────────────────────── -->
<div class="section-title">Barcha Kinolar <span id="totalCount"></span></div>

<!-- ─── LOADER ────────────────────────────────── -->
<div id="loader">
  <div class="spinner"></div>
  <p>Kinolar yuklanmoqda…</p>
</div>

<!-- ─── EMPTY STATE ───────────────────────────── -->
<div id="emptyState">
  <div class="emoji">🎭</div>
  <p>Kinolar topilmadi</p>
</div>

<!-- ─── GRID ──────────────────────────────────── -->
<div id="grid"></div>

<!-- ─── MODAL OVERLAY ─────────────────────────── -->
<div id="modalOverlay"></div>

<!-- ─── MODAL SHEET ───────────────────────────── -->
<div id="modal">
  <div class="modal-handle"></div>

  <div class="modal-hero" id="modalHero">
    <div class="modal-hero-placeholder" id="modalHeroPlaceholder">🎬</div>
    <img id="modalHeroImg" src="" alt="" style="display:none;" />
    <div class="modal-hero-gradient"></div>
    <button class="modal-close-btn" id="modalCloseBtn">✕</button>
    <div class="modal-hero-title" id="modalTitle"></div>
  </div>

  <div class="modal-body">
    <div class="modal-meta" id="modalMeta"></div>
    <div class="parts-label" id="partsLabel"></div>
    <div class="parts-list" id="partsList"></div>
    <div id="partsLoader" style="display:none; text-align:center; padding:20px;">
      <div class="spinner" style="margin:auto;"></div>
    </div>
  </div>
</div>

<!-- ─── TOAST ─────────────────────────────────── -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
